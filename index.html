<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ajmal & Sneha Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section id="scrub-section" class="scrub-section">
      <div class="sticky-stage">
        <canvas id="frameCanvas" aria-label="Ajmal and Sneha wedding animation"></canvas>
        <div id="loader" class="loader">Loading invitation… <span id="loadPercent">0%</span></div>
        <div id="nameReveal" class="name-reveal">
          <p>Wedding Invitation</p>
          <h1>Ajmal <span>&amp;</span> Sneha</h1>
        </div>
        <div class="scroll-hint">SCROLL</div>
      </div>
    </section>

    <section id="details" class="details-section">
      <div class="details-card">
        <p class="eyebrow">Together with their families</p>
        <h2>Ajmal &amp; Sneha</h2>
        <p class="subtitle">Request the pleasure of your presence as they begin their beautiful journey together.</p>
        <div class="detail-grid">
          <div>
            <span>Date</span>
            <strong>Update Date</strong>
          </div>
          <div>
            <span>Time</span>
            <strong>Update Time</strong>
          </div>
          <div>
            <span>Venue</span>
            <strong>Update Venue</strong>
          </div>
        </div>
        <p class="note">Edit these details directly in <code>index.html</code>.</p>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
