<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajmal & Sneha Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="frame-scroll" aria-label="Ajmal and Sneha wedding invitation">
    <canvas id="heroCanvas"></canvas>

    <section class="title-layer">
      <p class="eyebrow">Wedding Invitation</p>
      <h1>Ajmal &amp; Sneha</h1>
      <p class="scroll-hint">Scroll to reveal</p>
    </section>
  </main>

  <section class="details-section">
    <p class="eyebrow">Together with their families</p>
    <h2>Invite you to celebrate their wedding</h2>
    <div class="details-card">
      <p><strong>Date:</strong> Add your wedding date</p>
      <p><strong>Time:</strong> Add your wedding time</p>
      <p><strong>Venue:</strong> Add your venue</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
