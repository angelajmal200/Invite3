<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ajmal & Sneha Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-card">
      <div class="loader-title">Loading invitation</div>
      <div class="bar"><span id="barFill"></span></div>
      <div id="loadText" class="loader-text">Preparing frames...</div>
    </div>
  </div>

  <main>
    <section class="frame-section" id="frameSection">
      <canvas id="heroCanvas"></canvas>
      <div class="hint">Scroll</div>
    </section>

    <section class="details-section" id="detailsSection">
      <div class="details-card">
        <p class="eyebrow">Wedding Invitation</p>
        <h1>Ajmal &amp; Sneha</h1>
        <p class="sub">Together with their families, joyfully invite you to celebrate their wedding.</p>
        <div class="grid">
          <div><span>Date</span><strong>Update Date</strong></div>
          <div><span>Time</span><strong>Update Time</strong></div>
          <div><span>Venue</span><strong>Update Venue</strong></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
