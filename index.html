<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ajmal & Sneha Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-card">
      <div class="loader-title">Loading invitation</div>
      <div class="loader-bar"><span id="loaderBar"></span></div>
      <div id="loaderText" class="loader-text">0%</div>
    </div>
  </div>

  <main>
    <section class="scrub-section" id="scrubSection">
      <canvas id="frameCanvas" aria-label="Scroll controlled wedding animation"></canvas>
      <div class="hero-copy" id="heroCopy">
        <p class="eyebrow">Wedding Invitation</p>
        <h1>Ajmal <span>&amp;</span> Sneha</h1>
        <p class="subtitle">Together with their families</p>
      </div>
      <div class="scroll-hint" id="scrollHint">Scroll</div>
    </section>

    <section class="details-section" id="details">
      <div class="details-card">
        <p class="eyebrow">Save the Date</p>
        <h2>Ajmal &amp; Sneha</h2>
        <p class="lead">With joyful hearts, we invite you to celebrate our wedding.</p>

        <div class="detail-grid">
          <div>
            <span>Date</span>
            <strong>Update Date</strong>
          </div>
          <div>
            <span>Time</span>
            <strong>Update Time</strong>
          </div>
          <div>
            <span>Venue</span>
            <strong>Update Venue</strong>
          </div>
        </div>

        <a class="button" href="#" aria-label="Open location">View Location</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
